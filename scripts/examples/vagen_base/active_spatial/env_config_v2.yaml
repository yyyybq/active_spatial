# ===========================================================================
# Active Spatial - Single Scene Training (V2 Dataset, 6 task types)
# ===========================================================================
# 去掉了 centering, fov_inclusion, screen_occupancy 三种任务
# 保留: absolute_positioning, delta_control, equidistance,
#       projective_relations, occlusion_alignment, size_distance_invariance

env1:
    env_name: active_spatial
    env_config:
        # Dataset configuration - V2 (6 task types, no centering/fov_inclusion/screen_occupancy)
        jsonl_path: "/scratch/by2593/project/Active_Spatial/VAGEN/data_gen/active_spatial_pipeline/output_v2/train_data_0267_840790.jsonl"
        
        # Rendering: local GPU with gsplat (real-time rendering)
        render_backend: local
        gs_root: "/scratch/by2593/project/Active_Spatial/InteriorGS"
        gpu_device: 0  # Rendering GPU (will be overridden by RENDERING_GPU_ID env var if set)
        image_width: 512
        image_height: 512
        
        # Camera control configuration
        step_translation: 0.2  # meters per step
        step_rotation_deg: 10.0  # degrees per step
        
        # Spatial Potential Field (dense reward)
        enable_potential_field: true
        potential_field_position_weight: 0.7
        potential_field_orientation_weight: 0.3
        potential_field_reward_scale: 1.0
        success_score_threshold: 0.85
        
        # Collision Detection
        enable_collision_detection: true
        collision_camera_radius: 0.15
        collision_floor_height: 0.3
        collision_ceiling_height: 2.5
        collision_penalty: -0.15
        
        # Visibility Check
        enable_visibility_check: true
        fov_horizontal: 60.0
        fov_vertical: 60.0
        
        # Reward configuration
        format_reward: 0.05
        success_reward: 1.0
        max_distance: 5.0
        
        # Prompt configuration
        prompt_format: free_think
        max_actions_per_step: 5
        action_sep: "|"
        image_placeholder: "<image>"
        
        # Episode configuration
        max_episode_steps: 50
        
    # 278 tasks total, split into train/test
    train_size: 259
    test_size: 19
