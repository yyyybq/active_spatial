# =============================================================================
# Active Spatial - Single Scene Training (Balanced Dataset)
# =============================================================================
# 用于单场景(0267_840790)的训练实验，测试各任务类型的收敛情况
# 数据集已做任务类型均衡处理

env1:
    env_name: active_spatial
    env_config:
        # Dataset configuration - 均衡数据集
        jsonl_path: "/scratch/by2593/project/Active_Spatial/VAGEN/data_gen/active_spatial_pipeline/output/train_data_0267_840790_balanced.jsonl"
        
        # Rendering: local GPU with gsplat (real-time rendering)
        render_backend: local
        gs_root: "/scratch/by2593/project/Active_Spatial/InteriorGS"
        gpu_device: 4  # Dedicated GPU for rendering (GPU 4), separate from training GPUs (0-3)
        image_width: 512
        image_height: 512
        
        # Camera control configuration (精细动作)
        step_translation: 0.2  # meters per step (increased for better coverage)
        step_rotation_deg: 10.0  # degrees per step (increased for faster turning)
        
        # Spatial Potential Field (密集奖励)
        enable_potential_field: true
        potential_field_position_weight: 0.7
        potential_field_orientation_weight: 0.3
        potential_field_reward_scale: 1.0
        success_score_threshold: 0.85
        
        # Collision Detection
        enable_collision_detection: true
        collision_camera_radius: 0.15
        collision_floor_height: 0.3
        collision_ceiling_height: 2.5
        collision_penalty: -0.15
        
        # Visibility Check
        enable_visibility_check: true
        fov_horizontal: 60.0
        fov_vertical: 60.0
        
        # Reward configuration
        format_reward: 0.05  # reduced to make position reward more dominant
        success_reward: 1.0
        max_distance: 5.0  # meters
        
        # Prompt configuration
        prompt_format: free_think
        max_actions_per_step: 5
        action_sep: "|"
        image_placeholder: "<image>"
        
        # Episode configuration
        max_episode_steps: 50
        
    # 训练集用全部数据，测试集随机抽取
    train_size: 280
    test_size: 19
